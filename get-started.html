<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started | Treetop Business Solutions</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet" />

  <style>
    body { font-family: Jost, sans-serif; margin: 0; padding: 40px; background: #f9f9f9; }
    .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 6px; }
    .form-group { margin-bottom: 20px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; }
    button { padding: 12px 20px; background: #2e5d4f; color: white; border: none; cursor: pointer; }
    .error { color: red; display: none; margin-bottom: 15px; }
    .success { display: none; text-align: center; }
  </style>
</head>

<body>

<div class="container">

  <h2>Get Started</h2>

  <div class="error" id="form-error"></div>

  <form id="contact-form">

    <!-- Honeypot -->
    <input type="text" name="_gotcha" style="display:none;" />

    <div class="form-group">
      <input type="text" id="first-name" name="first_name" placeholder="First Name" required />
    </div>

    <div class="form-group">
      <input type="text" id="last-name" name="last_name" placeholder="Last Name" required />
    </div>

    <div class="form-group">
      <input type="text" id="company" name="company" placeholder="Company" required />
    </div>

    <div class="form-group">
      <input type="email" id="email" name="email" placeholder="Email" required />
    </div>

    <div class="form-group">
      <input type="tel" id="phone" name="phone" placeholder="Phone" required />
    </div>

    <div class="form-group">
      <label>Preferred Contact:</label><br>
      <input type="radio" name="contact_pref" value="Email" required /> Email
      <input type="radio" name="contact_pref" value="Phone" /> Phone
    </div>

    <div class="form-group">
      <label>Best Time:</label><br>
      <input type="checkbox" name="best_time" value="Morning" /> Morning
      <input type="checkbox" name="best_time" value="Afternoon" /> Afternoon
      <input type="checkbox" name="best_time" value="Evening" /> Evening
    </div>

    <div class="form-group">
      <label>Services:</label><br>
      <input type="checkbox" name="services" value="Bookkeeping" /> Bookkeeping
      <input type="checkbox" name="services" value="Tax" /> Tax
      <input type="checkbox" name="services" value="Consulting" /> Consulting
    </div>

    <div class="form-group">
      <textarea id="comments" name="comments" placeholder="Comments"></textarea>
    </div>

    <button type="submit" id="submit-btn">Send Message</button>

  </form>

  <div class="success" id="form-success">
    <h3>Message sent!</h3>
    <p>We’ll be in touch soon.</p>
  </div>

</div>

<script>
  const FORMSPREE_ID = "xrerylvl"; // <-- replace if needed

  const form = document.getElementById("contact-form");
  const errorEl = document.getElementById("form-error");
  const successEl = document.getElementById("form-success");
  const btn = document.getElementById("submit-btn");

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Send Message";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Sending...";

    // Honeypot
    if (form._gotcha.value) {
      form.style.display = "none";
      successEl.style.display = "block";
      return;
    }

    const bestTimes = [...document.querySelectorAll('input[name="best_time"]:checked')].map(i => i.value);
    const services = [...document.querySelectorAll('input[name="services"]:checked')].map(i => i.value);

    if (bestTimes.length === 0) {
      showError("Select at least one best time.");
      return;
    }

    if (services.length === 0) {
      showError("Select at least one service.");
      return;
    }

    const data = {
      first_name: form.first_name.value,
      last_name: form.last_name.value,
      name: form.first_name.value + " " + form.last_name.value,
      company: form.company.value,
      email: form.email.value,
      phone: form.phone.value,
      contact_preference: document.querySelector('input[name="contact_pref"]:checked')?.value || "",
      best_times: bestTimes.join(", "),
      services: services.join(", "),
      comments: form.comments.value || "None"
    };

    try {
      const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await res.json().catch(() => null);

      if (res.ok) {
        form.style.display = "none";
        successEl.style.display = "block";
      } else {
        console.error(result);
        showError(result?.errors?.[0]?.message || "Submission failed.");
      }

    } catch (err) {
      console.error(err);
      showError("Network error. Try again.");
    }
  });
</script>

</body>
</html>

<!-- ONLY showing key modified sections to keep this readable -->
<!-- Your layout, CSS, and structure remain unchanged -->

<form id="contact-form" novalidate>

  <!-- Honeypot -->
  <div style="display:none;" aria-hidden="true">
    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
  </div>

  <!-- Contact Info -->
  <div class="form-section-title">Contact Information</div>

  <div class="form-group">
    <label class="form-label">Name <span class="form-required">(required)</span></label>
    <div class="form-row">
      <div>
        <input type="text" class="form-input" id="first-name" name="first_name" required />
      </div>
      <div>
        <input type="text" class="form-input" id="last-name" name="last_name" required />
      </div>
    </div>
  </div>

  <div class="form-group">
    <input type="text" class="form-input" id="company" name="company" required />
  </div>

  <div class="form-group">
    <input type="email" class="form-input" id="email" name="email" required />
  </div>

  <div class="form-group">
    <input type="tel" class="form-input" id="phone" name="phone" required />
  </div>

  <!-- Preferences -->
  <div class="form-group">
    <label class="form-label">Do you prefer email or phone?</label>
    <input type="radio" name="contact_pref" value="Email" required />
    <input type="radio" name="contact_pref" value="Phone" />
  </div>

  <div class="form-group">
    <label class="form-label">Best Time</label>
    <input type="checkbox" name="best_time" value="Morning" />
    <input type="checkbox" name="best_time" value="Afternoon" />
    <input type="checkbox" name="best_time" value="Evening" />
  </div>

  <div class="form-group">
    <label class="form-label">Services</label>
    <input type="checkbox" name="services" value="Bookkeeping" />
    <input type="checkbox" name="services" value="Tax" />
  </div>

  <div class="form-group">
    <textarea id="comments" name="comments"></textarea>
  </div>

  <button type="submit" id="submit-btn">Send Message</button>

</form>

<script>
const FORMSPREE_ID = 'xrerylvl';

document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('submit-btn');
  const errorEl = document.getElementById('form-error');

  errorEl.classList.remove('visible');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  // Honeypot
  if (document.querySelector('input[name="_gotcha"]').value) return;

  const firstName = document.getElementById('first-name').value.trim();
  const lastName = document.getElementById('last-name').value.trim();
  const company = document.getElementById('company').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();

  const contactPref = document.querySelector('input[name="contact_pref"]:checked')?.value;

  const bestTimes = [...document.querySelectorAll('input[name="best_time"]:checked')].map(i => i.value);
  const services = [...document.querySelectorAll('input[name="services"]:checked')].map(i => i.value);

  if (!firstName || !lastName || !company || !email || !phone || !contactPref) {
    errorEl.textContent = 'Please fill all required fields.';
    errorEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Send Message';
    return;
  }

  if (bestTimes.length === 0) {
    errorEl.textContent = 'Select at least one best time.';
    errorEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Send Message';
    return;
  }

  if (services.length === 0) {
    errorEl.textContent = 'Select at least one service.';
    errorEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Send Message';
    return;
  }

  const data = {
    name: firstName + ' ' + lastName,
    company,
    email,
    phone,
    contact_preference: contactPref,
    best_times: bestTimes.join(', '),
    services: services.join(', '),
    comments: document.getElementById('comments').value || 'None'
  };

  try {
    const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await res.json().catch(() => null);

    if (res.ok) {
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('form-success').classList.add('visible');
    } else {
      console.error(result);
      errorEl.textContent = result?.errors?.[0]?.message || 'Submission failed.';
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Send Message';
    }

  } catch (err) {
    console.error(err);
    errorEl.textContent = 'Network error.';
    errorEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
});
</script>
